<!DOCTYPE html>
<html>
<head>
    <title>Data Types - Console Output</title>
</head>
<body>

<script>
// Primitive Data Types
let num = 10;
let name = "Vishnu";
let isStudent = true;
let x;
let y = null;

// Object Data Type
let student = {
    name: "Vishnu",
    age: 20
};

// Array
let fruits = ["Apple", "Banana", "Mango"];

// Display in console
console.log("Number:", num, "- Type:", typeof num);
console.log("String:", name, "- Type:", typeof name);
console.log("Boolean:", isStudent, "- Type:", typeof isStudent);
console.log("Undefined:", x, "- Type:", typeof x);
console.log("Null:", y, "- Type:", typeof y);
console.log("Object:", student, "- Type:", typeof student);
console.log("Array:", fruits, "- Type:", typeof fruits);
console.log(fruits[0]);
console.log(student['age']);
</script>

</body>
</html>
