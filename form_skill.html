<!DOCTYPE html>
<html>
<head>
    <title>Student Skill Selection Form</title>
</head>
<body>

<h1>Student Skill Profile Form</h1>

<form action="/submit.php" method="post" autocomplete="on">

    <h3>Personal Details</h3>

    <label for="name"><strong>Student Name:</strong></label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>
    <br><br>

    <label for="email"><strong>Email:</strong></label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <label for="department"><strong>Department:</strong></label>
    <input list="departments" id="department" name="department">
    <datalist id="departments">
        <option value="Computer Science">
        <option value="Information Technology">
        <option value="Electronics">
        <option value="Mechanical">
    </datalist>
    <br><br>

    <h3>Technical Skills</h3>

    <label><strong>Skill Level:</strong></label>
    <input type="radio" id="beginner" name="level" value="beginner">
    <label for="beginner">Beginner</label>

    <input type="radio" id="intermediate" name="level" value="intermediate">
    <label for="intermediate">Intermediate</label>

    <input type="radio" id="advanced" name="level" value="advanced">
    <label for="advanced">Advanced</label>
    <br><br>

    <label><strong>Programming Skills:</strong></label><br>

    <input type="checkbox" id="html" name="skills" value="HTML">
    <label for="html">HTML</label><br>

    <input type="checkbox" id="css" name="skills" value="CSS">
    <label for="css">CSS</label><br>

    <input type="checkbox" id="python" name="skills" value="Python">
    <label for="python">Python</label><br>

    <input type="checkbox" id="java" name="skills" value="Java">
    <label for="java">Java</label>
    <br><br>

    <label for="tools"><strong>Preferred Tool:</strong></label>
    <select id="tools" name="tools">
            <option value="vscode">VS Code</option>
            <option value="sublime">Sublime</option>
            <option value="pycharm">PyCharm</option>
            <option value="eclipse">Eclipse</option>
    </select>
    <br><br>

    <label for="projects"><strong>Describe Your Projects:</strong></label><br>
    <textarea id="projects" name="projects" rows="4" cols="40"></textarea>
    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
