<!DOCTYPE html>
<html>
<head>
    <title>Employee Information Form</title>
</head>
<body>

<h2>Employee Information Form</h2>

<form>

<label>Employee Name:</label>
<input type="text" name="emp_name" size="30" placeholder="Enter employee name" required>
<br><br>

<label>Employee Email:</label>
<input type="email" name="emp_email" placeholder="example@email.com" required>
<br><br>

<label>Organization Name:</label>
<!--read-only - the user cannot modify its value
The value is submitted with the form-->
<input type="text" name="org_name" value="KPR Technologies" readonly> 
<br><br>

<label>Employee ID:</label>
<!-- disabled - Completely disables the input field
User cannot click, edit, or interact with the field
The value is NOT submitted with the form-->
<input type="text" name="emp_id" value="EMP001" disabled>
<br><br>

<label>Working Hours:</label>
<input type="number" name="working_hours" min="3" max="8">
<br><br>

<label>Skills:</label><br>
<input type="checkbox" name="skills" value="HTML"> HTML
<input type="checkbox" name="skills" value="CSS"> CSS
<input type="checkbox" name="skills" value="JavaScript"> JavaScript
<input type="checkbox" name="skills" value="Python"> Python
<br><br>

<label>Job Type:</label><br>
<input type="radio" name="job_type" value="Full-time"> Full-time
<input type="radio" name="job_type" value="Part-time"> Part-time
<br><br>

<label>Upload Certificates:</label>
<input type="file" name="certificates" multiple>
<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
